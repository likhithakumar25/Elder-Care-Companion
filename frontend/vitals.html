<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitals</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 25px 35px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }

    .header-title h1 {
      font-size: 1.5em;
      font-weight: 600;
      color: #2d3748;
    }

    .back-btn {
      padding: 10px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    /* Stats Cards Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 15px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: white;
    }

    .stat-card:nth-child(1) .stat-icon {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .stat-card:nth-child(2) .stat-icon {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .stat-label {
      font-size: 0.9em;
      color: #718096;
      margin-bottom: 5px;
      font-weight: 500;
    }

    .stat-value {
      font-size: 1.8em;
      font-weight: 700;
      color: #2d3748;
    }

    /* Form Card */
    .form-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    .form-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e2e8f0;
    }

    .form-header i {
      font-size: 28px;
      color: #00f2fe;
    }

    .form-header h2 {
      font-size: 1.5em;
      font-weight: 600;
      color: #2d3748;
    }

    form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-weight: 500;
      color: #4a5568;
      font-size: 0.95em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group label i {
      color: #00f2fe;
      width: 20px;
    }

    input {
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1em;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      background: white;
    }

    input:focus {
      outline: none;
      border-color: #00f2fe;
      box-shadow: 0 0 0 3px rgba(0, 242, 254, 0.1);
    }

    button[type="submit"] {
      grid-column: 1 / -1;
      padding: 14px;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 242, 254, 0.4);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    /* Chart Card */
    .chart-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e2e8f0;
    }

    .chart-header i {
      font-size: 28px;
      color: #00f2fe;
    }

    .chart-header h3 {
      font-size: 1.5em;
      font-weight: 600;
      color: #2d3748;
    }

    #vitalsChart {
      max-width: 100%;
      height: auto !important;
    }

    /* Vitals List */
    .vitals-list-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    .list-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 2px solid #e2e8f0;
    }

    .list-header i {
      font-size: 28px;
      color: #00f2fe;
    }

    .list-header h3 {
      font-size: 1.5em;
      font-weight: 600;
      color: #2d3748;
    }

    #vitalsList {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .vital-item {
      background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
      padding: 20px;
      border-radius: 12px;
      border-left: 4px solid #00f2fe;
      transition: all 0.3s ease;
    }

    .vital-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .vital-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      padding: 8px;
      background: white;
      border-radius: 8px;
    }

    .vital-row:last-of-type {
      margin-bottom: 15px;
    }

    .vital-icon {
      width: 35px;
      height: 35px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }

    .vital-row:nth-child(1) .vital-icon {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .vital-row:nth-child(2) .vital-icon {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .vital-row:nth-child(3) .vital-icon {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }

    .vital-info {
      flex: 1;
    }

    .vital-label {
      font-size: 0.85em;
      color: #718096;
      font-weight: 500;
    }

    .vital-value {
      font-size: 1.1em;
      font-weight: 600;
      color: #2d3748;
    }

    .vital-time {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #718096;
      font-size: 0.85em;
      padding-top: 10px;
      border-top: 1px solid #e2e8f0;
    }

    .vital-time i {
      font-size: 12px;
      color: #00f2fe;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #718096;
      grid-column: 1 / -1;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 1em;
    }

    /* Loading Animation */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #00f2fe;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Success Message */
    .success-message {
      background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
      color: white;
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: slideDown 0.3s ease;
    }

    .success-message.show {
      display: flex;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }

      .header {
        flex-direction: column;
        text-align: center;
      }

      .form-card, .chart-card, .vitals-list-card {
        padding: 25px;
      }

      form {
        grid-template-columns: 1fr;
      }

      #vitalsList {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-icon">
          <i class="fas fa-heartbeat"></i>
        </div>
        <div class="header-title">
          <h1>Vital Signs</h1>
        </div>
      </div>
      <a href="dashboard_elder.html" class="back-btn">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
      </a>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-heartbeat"></i>
        </div>
        <div class="stat-label">Average Heart Rate</div>
        <div class="stat-value">72 bpm</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <i class="fas fa-tint"></i>
        </div>
        <div class="stat-label">Average Sugar Level</div>
        <div class="stat-value">90 mg/dL</div>
      </div>
    </div>

    <!-- Add Vitals Form -->
    <div class="form-card">
      <div class="success-message" id="successMessage">
        <i class="fas fa-check-circle"></i>
        <span>Vitals recorded successfully!</span>
      </div>
      
      <div class="form-header">
        <i class="fas fa-notes-medical"></i>
        <h2>Record New Vitals</h2>
      </div>

      <form id="vitalsForm">
        <div class="form-group">
          <label>
            <i class="fas fa-heart"></i>
            Blood Pressure
          </label>
          <input type="text" name="bp" placeholder="e.g., 120/80" required>
        </div>

        <div class="form-group">
          <label>
            <i class="fas fa-tint"></i>
            Sugar Level
          </label>
          <input type="text" name="sugar" placeholder="e.g., 90 mg/dL" required>
        </div>

        <div class="form-group">
          <label>
            <i class="fas fa-heartbeat"></i>
            Heart Rate
          </label>
          <input type="text" name="heart_rate" placeholder="e.g., 72 bpm" required>
        </div>

        <button type="submit">
          <i class="fas fa-plus-circle"></i>
          Record Vitals
        </button>
      </form>
    </div>

    <!-- Chart -->
    <div class="chart-card">
      <div class="chart-header">
        <i class="fas fa-chart-line"></i>
        <h3>Vitals Trend Chart</h3>
      </div>
      <canvas id="vitalsChart"></canvas>
    </div>

    <!-- Vitals History List -->
    <div class="vitals-list-card">
      <div class="list-header">
        <i class="fas fa-history"></i>
        <h3>Vitals History</h3>
      </div>
      <ul id="vitalsList">
        <li class="empty-state">
          <div class="loading"></div>
        </li>
      </ul>
    </div>
  </div>

  <!-- YOUR EXISTING SCRIPTS - DO NOT MODIFY -->
  <script>
    document.getElementById('vitalsForm').onsubmit = async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());
      const res = await fetch('../backend/add_vitals.php', {
        method: 'POST', body: JSON.stringify(data)
      });
      const result = await res.json();
      if (result.status === 'success') {
        // Show success message
        const successMsg = document.getElementById('successMessage');
        successMsg.classList.add('show');
        setTimeout(() => {
          successMsg.classList.remove('show');
        }, 3000);
        
        e.target.reset(); 
        loadVitals();
      } else { 
        alert(result.message); 
      }
    };

    let chart; // ✅ Track chart instance

    async function loadVitals() {
      const res = await fetch('../backend/get_vitals.php');
      const vitals = await res.json();
      const list = document.getElementById('vitalsList');
      
      if (!vitals || vitals.length === 0) {
        list.innerHTML = `
          <li class="empty-state">
            <i class="fas fa-chart-line"></i>
            <p>No vitals recorded yet. Add your first reading above!</p>
          </li>
        `;
        return;
      }
      
      list.innerHTML = '';

      const labels = [];
      const bpData = [];
      const sugarData = [];
      const hrData = [];

      vitals.forEach(v => {
        labels.push(v.recorded_at);
        bpData.push(parseInt(v.bp));
        sugarData.push(parseInt(v.sugar));
        hrData.push(parseInt(v.heart_rate));
        
        const item = document.createElement('li');
        item.className = 'vital-item';
        item.innerHTML = `
          <div class="vital-row">
            <div class="vital-icon">
              <i class="fas fa-heart"></i>
            </div>
            <div class="vital-info">
              <div class="vital-label">Blood Pressure</div>
              <div class="vital-value">${v.bp}</div>
            </div>
          </div>
          <div class="vital-row">
            <div class="vital-icon">
              <i class="fas fa-tint"></i>
            </div>
            <div class="vital-info">
              <div class="vital-label">Sugar Level</div>
              <div class="vital-value">${v.sugar}</div>
            </div>
          </div>
          <div class="vital-row">
            <div class="vital-icon">
              <i class="fas fa-heartbeat"></i>
            </div>
            <div class="vital-info">
              <div class="vital-label">Heart Rate</div>
              <div class="vital-value">${v.heart_rate}</div>
            </div>
          </div>
          <div class="vital-time">
            <i class="far fa-clock"></i>
            Recorded at: ${v.recorded_at}
          </div>
        `;
        list.appendChild(item);
      });

      const ctx = document.getElementById('vitalsChart').getContext('2d');
      if (chart) chart.destroy(); // ✅ Prevent duplicate charts
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'Blood Pressure', data: bpData, borderColor: '#E91E63', fill: false },
            { label: 'Sugar Level', data: sugarData, borderColor: '#3F51B5', fill: false },
            { label: 'Heart Rate', data: hrData, borderColor: '#4CAF50', fill: false }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom' } },
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    loadVitals();
  </script>
</body>
</html>
