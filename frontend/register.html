<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #c9d6ff, #e2e2e2);
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0;
    }
    .container {
      background: white; padding: 30px; border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 400px;
    }
    h2 { text-align: center; margin-bottom: 20px; }
    input, select {
      width: 100%; padding: 10px; margin: 10px 0;
      border: 1px solid #ccc; border-radius: 5px;
    }
    button {
      width: 100%; padding: 10px; background: #4CAF50;
      color: white; border: none; border-radius: 5px;
      cursor: pointer; font-size: 16px;
    }
    button:hover { background: #45a049; }
    footer {
      text-align: center; margin-top: 20px; font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2><i class="fas fa-user-plus"></i> Register</h2>
    <form id="registerForm">
      <select name="role" required>
        <option value="">Select Role</option>
        <option value="elder">Elder</option>
        <option value="caregiver">Caregiver</option>
        <option value="family">Family</option>
      </select>
      <input type="text" name="first_name" placeholder="First Name">
      <input type="text" name="last_name" placeholder="Last Name">
      <input type="number" name="age" placeholder="Age">
      <input type="text" name="contact" placeholder="Contact">
      <input type="text" name="address" placeholder="Address">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <input type="email" name="elder_email" placeholder="Elder's Email (for caregiver/family)">
      <button type="submit">Register</button>
    </form>
    <footer>© 2025 Elderly Care Companion</footer>
  </div>

  <script>
    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const data = Object.fromEntries(form.entries());

      const res = await fetch('../backend/register.php', {
        method: 'POST',
        body: JSON.stringify(data)
      });
      const result = await res.json();

      if (result.status === 'success') {
        alert("Registered successfully");
        window.location.href = 'login.html';
      } else {
        alert(result.message);
      }
    };
  </script>
</body>
</html>
