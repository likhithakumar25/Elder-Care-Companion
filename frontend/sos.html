<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOS Contacts</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    h2 {
      font-weight: 600;
      font-size: 1.8em;
      color: #2d3748;
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 25px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }
    input[type="text"] {
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1em;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      background: white;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #00f2fe;
      box-shadow: 0 0 0 3px rgba(0, 242, 254, 0.1);
    }
    button[type="submit"], button.trigger-sos {
      padding: 14px;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }
    button[type="submit"]:hover, button.trigger-sos:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 242, 254, 0.4);
    }
    ul#sosList {
      list-style: none;
      max-height: 300px;
      overflow-y: auto;
      border-radius: 12px;
      background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }
    ul#sosList li {
      padding: 15px 20px;
      border-left: 4px solid #00f2fe;
      color: #2d3748;
      font-weight: 600;
      font-size: 1.05em;
      transition: all 0.3s ease;
    }
    ul#sosList li:hover {
      background: white;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      transform: translateY(-3px);
    }
    /* Responsive adjustments */
    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2><i class="fas fa-exclamation-triangle"></i> SOS Contacts</h2>
    <form id="sosForm">
      <input type="text" name="contact_name" placeholder="Contact Name" required />
      <input type="text" name="phone" placeholder="Phone Number" required />
      <button type="submit"><i class="fas fa-plus-circle"></i> Add</button>
    </form>

    <h3 style="text-align:center; margin-bottom: 15px; color: #2d3748; font-weight: 600;">Your SOS Contacts</h3>
    <ul id="sosList"></ul>

    <button class="trigger-sos" onclick="triggerSOS()"><i class="fas fa-bell"></i> Trigger SOS</button>
  </div>

  <script>
    // Your existing scripts below unchanged
    document.getElementById('sosForm').onsubmit = async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());
      const res = await fetch('../backend/add_sos_contact.php', {
        method: 'POST', body: JSON.stringify(data)
      });
      const result = await res.json();
      if (result.status === 'success') {
        e.target.reset(); loadContacts();
      } else { alert(result.message); }
    };

    async function loadContacts() {
      const res = await fetch('../backend/get_sos_contacts.php');
      const contacts = await res.json();
      const list = document.getElementById('sosList');
      list.innerHTML = '';
      contacts.forEach(c => {
        list.innerHTML += `<li>${c.contact_name} - ${c.phone}</li>`;
      });
    }

    async function triggerSOS() {
      const res = await fetch('../backend/trigger_sos.php');
      const result = await res.json();
      if (result.status === 'success') {
        alert("🚨 SOS Triggered!\n" + result.contacts.map(c => `${c.contact_name}: ${c.phone}`).join('\n'));
      } else {
        alert(result.message);
      }
    }

    loadContacts();
  </script>
</body>
</html>
